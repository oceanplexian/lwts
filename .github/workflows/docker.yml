name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  build-amd64:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - name: Load settings
        run: |
          source settings.sh
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMIT=$COMMIT" >> $GITHUB_ENV
          echo "BUILD_DATE=$DATE" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/oceanplexian/lwts
            docker.io/oceanplexian/lwts
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          cache-from: type=registry,ref=ghcr.io/oceanplexian/lwts:buildcache-amd64
          cache-to: type=registry,ref=ghcr.io/oceanplexian/lwts:buildcache-amd64,mode=max

  build-arm64:
    runs-on: [self-hosted, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Load settings
        run: |
          source settings.sh
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMIT=$COMMIT" >> $GITHUB_ENV
          echo "BUILD_DATE=$DATE" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/oceanplexian/lwts
            docker.io/oceanplexian/lwts
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          cache-from: type=registry,ref=ghcr.io/oceanplexian/lwts:buildcache-arm64
          cache-to: type=registry,ref=ghcr.io/oceanplexian/lwts:buildcache-arm64,mode=max

  merge-manifests:
    runs-on: arc-runner-set
    needs: [build-amd64, build-arm64]
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/oceanplexian/lwts
            docker.io/oceanplexian/lwts
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push multi-arch manifests
        run: |
          for tag in ${{ steps.meta.outputs.tags }}; do
            echo "Creating manifest for $tag"
            docker buildx imagetools create -t "$tag" \
              "$tag"
          done

      - name: Format tags
        id: tags
        run: echo "list=$(echo '${{ steps.meta.outputs.tags }}' | sed 's/.*://' | sort -u | sed 's/.*/`&`/' | tr '\n' ' ' | sed 's/ / · /g; s/ · $//')" >> $GITHUB_OUTPUT

      - name: Comment on commit
        uses: peter-evans/commit-comment@v3
        with:
          body: |
            ### Deployment

            ✅ Published to **GHCR** and **DockerHub** — `linux/amd64` · `linux/arm64`

            ```
            docker pull ghcr.io/oceanplexian/lwts:${{ steps.meta.outputs.version }}
            ```

            ${{ steps.tags.outputs.list }}

            [GHCR →](https://github.com/oceanplexian/lwts/pkgs/container/lwts)  ·  [DockerHub →](https://hub.docker.com/r/oceanplexian/lwts)
