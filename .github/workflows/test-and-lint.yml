name: Test & Lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-test:
    name: Go Tests
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - run: go test -v -count=1 ./...

  go-test-postgres:
    name: Go Tests (PostgreSQL)
    runs-on: arc-runner-set
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lwts_test
          POSTGRES_PASSWORD: lwts_test
          POSTGRES_DB: lwts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lwts_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - run: go test -v -count=1 -tags=integration ./...
        env:
          DB_URL: postgres://lwts_test:lwts_test@localhost:5432/lwts_test?sslmode=disable

  golangci-lint:
    name: Lint
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - run: golangci-lint run ./...

  frontend-build:
    name: Frontend Build
    runs-on: arc-runner-set
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
