name: Test & Lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-test:
    name: Go Tests
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - run: go test -v -count=1 ./...

  go-test-postgres:
    name: Go Tests (PostgreSQL)
    runs-on: arc-runner-set
    services:
      postgres:
        # pgvector/pgvector:pg16 ships postgres 16 with the vector extension
        # preinstalled. This unblocks the optional semantic search feature
        # being exercised by integration tests.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lwts_test
          POSTGRES_PASSWORD: lwts_test
          POSTGRES_DB: lwts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lwts_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      # -p=1 serializes test packages. Integration tests share one postgres
      # instance, and concurrent CREATE TABLE / DROP SCHEMA between packages
      # races on the pg catalog (pg_type_typname_nsp_index), which shows up
      # as intermittent "duplicate key" / "no schema selected" failures.
      - run: go test -v -count=1 -p=1 -tags=integration ./...
        env:
          DB_URL: postgres://lwts_test:lwts_test@localhost:5432/lwts_test?sslmode=disable

  golangci-lint:
    name: Lint
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - run: GOBIN=/home/runner/.cache/gobin go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - run: /home/runner/.cache/gobin/golangci-lint run ./...

  frontend-build:
    name: Frontend Build
    runs-on: arc-runner-set
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
