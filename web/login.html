<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LWTS — Sign In</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Libre+Franklin:wght@300;400;500;600&display=block" rel="stylesheet">
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/styles/login.css">
</head>
<body>
  <div class="auth-debug-switcher" id="auth-debug-switcher">
    <button type="button" data-view="login" class="active">Login</button>
    <button type="button" data-view="register">Register</button>
    <button type="button" data-view="forgot">Reset</button>
  </div>
  <button class="auth-theme-toggle" id="auth-theme-toggle" type="button" aria-label="Toggle theme">
    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
  <div class="auth-page">
    <div class="auth-card" style="opacity:0">

      <!-- Fixed header — always visible -->
      <div class="auth-header">
        <div class="auth-logo"><span class="auth-logo-box"><svg class="auth-logo-img" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><g transform="rotate(270 12 12)"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M8 7v9"/><path d="M12 7v4"/><path d="M16 7v7"/></g></svg></span>LWTS</div>
        <div class="auth-subtitle" id="auth-subtitle">Sign in to your workspace</div>
      </div>

      <!-- Error banner — hidden by default, no layout space -->
      <div class="auth-banner" id="auth-banner">
        <span class="auth-banner-text"></span>
        <button class="auth-banner-close" type="button">&times;</button>
      </div>

      <!-- ── Login ── -->
      <div class="auth-form-view active" id="view-login">
        <form id="login-form" novalidate>
          <div class="auth-fields">
            <div class="auth-field">
              <label class="auth-label" for="login-email">Email</label>
              <div class="auth-input-wrap">
                <input class="auth-input" id="login-email" type="email" placeholder="you@example.com"
                       data-validate="required email" autocomplete="email">
              </div>
              <div class="auth-error"></div>
            </div>

            <div class="auth-field">
              <label class="auth-label" for="login-password">Password</label>
              <div class="auth-input-wrap">
                <input class="auth-input" id="login-password" type="password" placeholder="Enter your password"
                       data-validate="required" autocomplete="current-password">
                <button class="auth-pw-toggle" type="button" tabindex="-1">
                  <svg class="eye-on" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-off" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
              <div class="auth-error"></div>
            </div>

            <div class="auth-forgot-row">
              <button class="auth-link" type="button" data-auth-view="forgot">Forgot password?</button>
            </div>
          </div>

          <div class="auth-actions">
            <button class="auth-btn" type="submit">
              <svg class="auth-spinner" style="display:none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
              <span class="auth-btn-text" data-default="Sign in">Sign in</span>
            </button>
            <div class="auth-footer">
              Don't have an account? <button class="auth-link" type="button" data-auth-view="register">Create an account</button>
            </div>
          </div>
        </form>
      </div>

      <!-- ── Register ── -->
      <div class="auth-form-view" id="view-register">
        <form id="register-form" novalidate>
          <div class="auth-fields">
            <div class="auth-field">
              <label class="auth-label" for="reg-name">Full name</label>
              <div class="auth-input-wrap">
                <input class="auth-input" id="reg-name" type="text" placeholder="Jane Doe"
                       data-validate="required minlen:2" autocomplete="name">
              </div>
              <div class="auth-error"></div>
            </div>

            <div class="auth-field">
              <label class="auth-label" for="reg-email">Email</label>
              <div class="auth-input-wrap">
                <input class="auth-input" id="reg-email" type="email" placeholder="you@example.com"
                       data-validate="required email" autocomplete="email">
              </div>
              <div class="auth-error"></div>
            </div>

            <div class="auth-field">
              <label class="auth-label" for="reg-password">Password</label>
              <div class="auth-input-wrap">
                <input class="auth-input" id="reg-password" type="password" placeholder="Enter password"
                       data-validate="required" autocomplete="new-password">
                <button class="auth-pw-toggle" type="button" tabindex="-1">
                  <svg class="eye-on" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-off" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
              <div class="auth-error"></div>
              <div class="auth-strength" id="pw-strength" data-level="0">
                <div class="auth-strength-seg"></div>
                <div class="auth-strength-seg"></div>
                <div class="auth-strength-seg"></div>
                <div class="auth-strength-seg"></div>
              </div>
              <div class="auth-strength-label" id="pw-strength-label"></div>
            </div>

            <div class="auth-field">
              <label class="auth-label" for="reg-confirm">Confirm password</label>
              <div class="auth-input-wrap">
                <input class="auth-input" id="reg-confirm" type="password" placeholder="Re-enter password"
                       data-validate="required match:reg-password" autocomplete="new-password">
              </div>
              <div class="auth-error"></div>
            </div>
          </div>

          <div class="auth-actions">
            <button class="auth-btn" type="submit">
              <svg class="auth-spinner" style="display:none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
              <span class="auth-btn-text" data-default="Create account">Create account</span>
            </button>
            <div class="auth-footer">
              Already have an account? <button class="auth-link" type="button" data-auth-view="login">Sign in</button>
            </div>
          </div>
        </form>
      </div>

      <!-- ── Forgot Password ── -->
      <div class="auth-form-view" id="view-forgot">
        <form id="forgot-form" novalidate>
          <div class="auth-fields">
            <div id="forgot-form-fields">
              <div class="auth-field">
                <label class="auth-label" for="forgot-email">Email address</label>
                <div class="auth-input-wrap">
                  <input class="auth-input" id="forgot-email" type="email" placeholder="you@example.com"
                         data-validate="required email" autocomplete="email">
                </div>
                <div class="auth-error"></div>
              </div>
            </div>

            <div id="forgot-success" style="display:none">
              <div class="auth-success-msg">
                <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <p>If an account exists with that email, we've sent a password reset link. Check your inbox.</p>
              </div>
            </div>
          </div>

          <div class="auth-actions">
            <button class="auth-btn" id="forgot-submit-btn" type="submit">
              <svg class="auth-spinner" style="display:none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
              <span class="auth-btn-text" data-default="Send reset link">Send reset link</span>
            </button>
            <div class="auth-footer">
              <button class="auth-link" type="button" data-auth-view="login">Back to sign in</button>
            </div>
          </div>
        </form>
      </div>

    </div>
  </div>

  <script type="module" src="/src/login.js"></script>
</body>
</html>
